<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tesseract Synthetic Substrate</title>
    <style>
      :root {
        color-scheme: light;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        background: #fafafa;
        color: #111;
      }
      main {
        max-width: 960px;
        margin: 0 auto;
        padding: 32px 24px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      [data-substrate-state="no-world"],
      [data-substrate-state="missing-renderer"] {
        padding: 16px;
        border: 1px solid #c33;
        background: #fff4f4;
        color: #900;
        border-radius: 8px;
      }
      [data-substrate-state="empty"] {
        padding: 16px;
        color: #666;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./synthetic-app.js"></script>
  </body>
</html>
