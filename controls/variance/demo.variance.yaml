kind: variance-manifest
version: 1
description: Programmatic entropy injection for demo harness knowledge hardening
screen: policy-detail

drift-events:
  - id: label-change-effective-date
    type: label-change
    target:
      screen: policy-detail
      element: effectiveDate
    mutation:
      field: name
      from: Effective Date
      to: Coverage Start Date

  - id: locator-degradation-claims-table
    type: locator-degradation
    target:
      screen: policy-detail
      element: claimsTable
    mutation:
      field: testId
      from: claims-table
      to: claims-list-table

  - id: element-addition-premium-amount
    type: element-addition
    target:
      screen: policy-detail
    mutation:
      elementId: premiumAmount
      definition:
        role: text
        name: Premium Amount
        testId: premium-amount
        surface: detail-fields
        widget: os-region
        required: false

  - id: alias-removal-back-to-search
    type: alias-removal
    target:
      screen: policy-detail
      element: backToSearch
    mutation:
      removedAliases:
        - back link
        - return to search
