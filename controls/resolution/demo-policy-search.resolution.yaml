kind: resolution-control
version: 1
name: demo-policy-search
selector:
  adoIds:
    - "10001"
  suites:
    - demo/policy-search
  tags:
    - smoke
steps:
  - stepIndex: 2
    resolution:
      action: input
      screen: policy-search
      element: policyNumberInput
      posture: valid
  - stepIndex: 3
    resolution:
      action: click
      screen: policy-search
      element: searchButton
  - stepIndex: 4
    resolution:
      action: assert-snapshot
      screen: policy-search
      element: resultsTable
      snapshot_template: snapshots/policy-search/results-with-policy.yaml
