<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Policy Search</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at top left, #f7fbff 0%, #eef3f7 45%, #e2ebf1 100%);
        color: #0c2231;
      }

      main {
        max-width: 960px;
        margin: 0 auto;
        padding: 48px 24px 80px;
      }

      .card {
        background: rgba(255, 255, 255, 0.92);
        border: 1px solid rgba(12, 34, 49, 0.08);
        border-radius: 20px;
        box-shadow: 0 24px 60px rgba(12, 34, 49, 0.08);
        padding: 24px;
      }

      .layout {
        display: grid;
        gap: 24px;
      }

      .field {
        display: grid;
        gap: 8px;
      }

      label {
        font-weight: 700;
        letter-spacing: 0.02em;
      }

      input,
      button {
        font: inherit;
      }

      input {
        padding: 12px 14px;
        border: 1px solid #a7bbc7;
        border-radius: 12px;
      }

      button {
        justify-self: start;
        padding: 12px 18px;
        border: none;
        border-radius: 999px;
        background: #0d5c63;
        color: #ffffff;
        font-weight: 700;
        cursor: pointer;
      }

      button:disabled {
        background: #8ca3a5;
        cursor: not-allowed;
      }

      .ValidationMessage {
        color: #9d1c1c;
        font-weight: 600;
      }

      [hidden] {
        display: none !important;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        padding: 12px 14px;
        border-bottom: 1px solid #d3dfe6;
        text-align: left;
      }

      thead {
        background: #edf5f6;
      }
    </style>
  </head>
  <body>
    <main class="layout">
      <header class="card">
        <h1>Policy Search</h1>
        <p>Deterministic demo harness for the Tesseract vertical slice.</p>
      </header>

      <section class="card" id="search-form" aria-label="Search Form">
        <div class="field">
          <label for="policy-number-input">Policy Number</label>
          <input
            id="policy-number-input"
            data-testid="policy-number-input"
            type="text"
            autocomplete="off"
          />
        </div>

        <div
          id="validation-summary"
          data-testid="validation-summary"
          class="ValidationMessage"
          role="alert"
          hidden
        >
          No matching policy found.
        </div>

        <button id="search-button" data-testid="search-button" type="button">
          Search
        </button>
      </section>

      <section class="card" id="results-wrapper" aria-label="Results Panel" hidden>
        <table
          aria-label="Search Results"
          data-testid="search-results-table"
          id="results-section"
        >
          <thead>
            <tr>
              <th scope="col">Policy Number</th>
              <th scope="col">Status</th>
            </tr>
          </thead>
          <tbody id="results-body"></tbody>
        </table>
      </section>
    </main>

    <script>
      (function bootstrap() {
        const policies = {
          'POL-001': { number: 'POL-001', status: 'Active' },
        };

        const params = new URL(window.location.href).searchParams;
        const seededValue = params.get('seed');

        const input = document.getElementById('policy-number-input');
        const button = document.getElementById('search-button');
        const alertBox = document.getElementById('validation-summary');
        const resultsWrapper = document.getElementById('results-wrapper');
        const resultsBody = document.getElementById('results-body');

        function renderPolicy(policy) {
          resultsBody.innerHTML = '';
          const row = document.createElement('tr');
          row.innerHTML =
            '<td>' + policy.number + '</td>' +
            '<td>' + policy.status + '</td>';
          resultsBody.appendChild(row);
          resultsWrapper.hidden = false;
          alertBox.hidden = true;
        }

        function clearResults() {
          resultsBody.innerHTML = '';
          resultsWrapper.hidden = true;
        }

        function search() {
          const value = input.value.trim().toUpperCase();
          const match = policies[value];

          if (match) {
            renderPolicy(match);
            return;
          }

          clearResults();
          alertBox.hidden = false;
        }

        button.addEventListener('click', search);

        input.addEventListener('input', function onInput() {
          if (alertBox.hidden === false) {
            alertBox.hidden = true;
          }
        });

        if (seededValue) {
          input.value = seededValue.toUpperCase();
          search();
        }
      })();
    </script>
  </body>
</html>
