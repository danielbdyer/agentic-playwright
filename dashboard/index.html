<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tesseract Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d1117; color: #c9d1d9; }
    .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
    h1 { color: #58a6ff; margin-bottom: 20px; font-size: 24px; }
    h2 { color: #8b949e; margin-bottom: 12px; font-size: 16px; text-transform: uppercase; letter-spacing: 1px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
    .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 16px; }
    .card-full { grid-column: 1 / -1; }
    .metric { display: flex; justify-content: space-between; align-items: baseline; padding: 8px 0; border-bottom: 1px solid #21262d; }
    .metric:last-child { border-bottom: none; }
    .metric-label { color: #8b949e; font-size: 13px; }
    .metric-value { color: #f0f6fc; font-size: 18px; font-weight: 600; }
    .metric-value.good { color: #3fb950; }
    .metric-value.warn { color: #d29922; }
    .metric-value.bad { color: #f85149; }
    .rung-bar { display: flex; height: 24px; border-radius: 4px; overflow: hidden; margin: 4px 0; }
    .rung-segment { display: flex; align-items: center; justify-content: center; font-size: 10px; color: #fff; min-width: 30px; }
    .work-item { padding: 10px; border: 1px solid #30363d; border-radius: 6px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
    .work-item.high { border-left: 3px solid #d29922; }
    .work-item.low { border-left: 3px solid #30363d; }
    .item-title { font-size: 13px; flex: 1; }
    .item-badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; margin-left: 8px; }
    .badge-proposal { background: #1f6feb33; color: #58a6ff; }
    .badge-hotspot { background: #d2992233; color: #d29922; }
    .badge-interpret { background: #f8514933; color: #f85149; }
    .priority-score { font-size: 12px; color: #8b949e; min-width: 50px; text-align: right; }
    .btn { padding: 4px 12px; border-radius: 4px; border: 1px solid #30363d; background: #21262d; color: #c9d1d9; cursor: pointer; font-size: 12px; }
    .btn:hover { background: #30363d; }
    .btn-primary { background: #238636; border-color: #2ea043; }
    .btn-primary:hover { background: #2ea043; }
    .empty { color: #484f58; font-style: italic; padding: 20px; text-align: center; }
    .status-bar { display: flex; gap: 16px; margin-bottom: 20px; padding: 12px 16px; background: #161b22; border: 1px solid #30363d; border-radius: 8px; }
    .status-item { font-size: 13px; }
    .status-label { color: #8b949e; }
    .status-value { color: #f0f6fc; font-weight: 600; margin-left: 4px; }
    .lineage-entry { font-size: 12px; color: #8b949e; padding: 4px 0; border-bottom: 1px solid #21262d; }
    .screen-group { margin-bottom: 16px; }
    .screen-header { font-size: 14px; color: #58a6ff; padding: 6px 0; border-bottom: 1px solid #30363d; margin-bottom: 8px; }
    .refresh-btn { float: right; }
    #root { min-height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="dashboard.js"></script>
</body>
</html>
