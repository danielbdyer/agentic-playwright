<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tesseract Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* ─── Reset + Theme ─── */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d1117; color: #c9d1d9; overflow: hidden; }
    h1 { color: #58a6ff; margin-bottom: 20px; font-size: 24px; display: flex; align-items: center; justify-content: space-between; }
    h2 { color: #8b949e; margin-bottom: 12px; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }

    /* ─── Spatial Layout: canvas left, controls right ─── */
    .dashboard-layout { display: grid; grid-template-columns: 1fr 420px; height: 100vh; }
    .spatial-viewport { position: relative; background: #080b10; overflow: hidden; }
    .control-panel { overflow-y: auto; padding: 20px; background: #0d1117; border-left: 1px solid #21262d; }
    .buffer-indicator {
      position: absolute; bottom: 12px; left: 12px;
      padding: 4px 10px; border-radius: 4px;
      background: rgba(88, 166, 255, 0.15); color: #58a6ff;
      font-size: 11px; pointer-events: none; z-index: 2;
    }
    .mcp-indicator {
      position: absolute; top: 12px; right: 12px;
      padding: 4px 10px; border-radius: 4px;
      background: rgba(63, 185, 80, 0.15); color: #3fb950;
      font-size: 11px; font-weight: 700; letter-spacing: 1px;
      pointer-events: none; z-index: 2;
    }

    @media (max-width: 900px) {
      .dashboard-layout { grid-template-columns: 1fr; grid-template-rows: 50vh 1fr; }
      .control-panel { border-left: none; border-top: 1px solid #21262d; }
    }

    /* ─── Layout ─── */
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 16px; }
    .card-full { grid-column: 1 / -1; }

    /* ─── Metrics ─── */
    .metric { display: flex; justify-content: space-between; align-items: baseline; padding: 6px 0; border-bottom: 1px solid #21262d; }
    .metric:last-child { border-bottom: none; }
    .metric-label { color: #8b949e; font-size: 13px; }
    .metric-value { color: #f0f6fc; font-size: 16px; font-weight: 600; }
    .metric-value.good { color: #3fb950; }
    .metric-value.warn { color: #d29922; }
    .metric-value.bad { color: #f85149; }

    /* ─── Rung Bar ─── */
    .rung-bar { display: flex; height: 24px; border-radius: 4px; overflow: hidden; margin: 4px 0; }
    .rung-segment { display: flex; align-items: center; justify-content: center; font-size: 10px; color: #fff; min-width: 24px; }

    /* ─── Status Bar ─── */
    .status-bar { display: flex; gap: 16px; margin-bottom: 16px; padding: 10px 16px; background: #161b22; border: 1px solid #30363d; border-radius: 8px; flex-wrap: wrap; }
    .status-item { font-size: 13px; display: flex; align-items: center; gap: 4px; }
    .status-label { color: #8b949e; }
    .status-value { color: #f0f6fc; font-weight: 600; }
    .connection-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; }
    .connection-dot.connected { background: #3fb950; }
    .connection-dot.disconnected { background: #f85149; }

    /* ─── Empty State ─── */
    .empty { color: #484f58; font-style: italic; padding: 20px; text-align: center; }
    .btn { padding: 4px 12px; border-radius: 4px; border: 1px solid #30363d; background: #21262d; color: #c9d1d9; cursor: pointer; font-size: 12px; transition: background 150ms; }
    .btn:hover { background: #30363d; }
    .btn-approve { background: #238636; border-color: #2ea043; color: #fff; }
    .btn-approve:hover { background: #2ea043; }

    /* ═══════════════════════════════════════════════════════
       Queue Animation System — CSS-only, 60fps
       GPU-composited transforms only: translate, scale, opacity
       No layout properties (height, width, margin) in transitions
       ═══════════════════════════════════════════════════════ */

    .queue-container { position: relative; min-height: 200px; }

    .queue-item {
      padding: 12px 16px;
      border: 1px solid #30363d;
      border-radius: 6px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      /* GPU-composited transitions only */
      transition:
        transform 300ms cubic-bezier(0.4, 0, 0.2, 1),
        opacity 300ms ease-out,
        background-color 200ms ease,
        border-color 200ms ease,
        box-shadow 200ms ease;
    }

    /* Entering: slide down + fade in */
    .queue-item[data-status="entering"] {
      transform: translateY(-20px) scale(0.97);
      opacity: 0;
    }

    /* Pending: normal position */
    .queue-item[data-status="pending"] {
      transform: translateY(0) scale(1);
      opacity: 1;
    }

    /* Processing: subtle highlight + scale — GPU composited */
    .queue-item[data-status="processing"] {
      transform: translateX(6px) scale(1.01);
      opacity: 1;
      background: rgba(88, 166, 255, 0.06);
      border-color: rgba(88, 166, 255, 0.3);
      box-shadow: 0 0 12px rgba(88, 166, 255, 0.1);
      will-change: transform, opacity;
    }

    /* Processing pulse animation */
    .queue-item[data-status="processing"]::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: #58a6ff;
      border-radius: 3px 0 0 3px;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    /* Completed: slide right + fade out */
    .queue-item[data-status="completed"] {
      transform: translateX(100px) scale(0.97);
      opacity: 0;
      pointer-events: none;
    }

    /* Skipped: fade down */
    .queue-item[data-status="skipped"] {
      transform: translateY(10px) scale(0.97);
      opacity: 0;
      pointer-events: none;
    }

    /* ─── Queue Item Content ─── */
    .item-content { flex: 1; min-width: 0; }
    .item-title { font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; margin-right: 6px; display: inline-block; }
    .item-detail { font-size: 12px; color: #8b949e; margin-top: 4px; }
    .item-actions { display: flex; gap: 6px; align-items: center; margin-left: 12px; flex-shrink: 0; }
    .priority-score { font-size: 12px; color: #8b949e; min-width: 40px; text-align: right; }

    .screen-header { font-size: 14px; color: #58a6ff; padding: 6px 0; border-bottom: 1px solid #30363d; margin-bottom: 8px; }
    .screen-group { margin-bottom: 16px; }

    /* ─── Lineage Timeline ─── */
    .lineage-entry { font-size: 12px; color: #8b949e; padding: 4px 0; border-bottom: 1px solid #21262d; }

    /* ─── Convergence Ribbon ─── */
    .convergence-ribbon { display: flex; gap: 2px; overflow-x: auto; padding: 4px 0; scrollbar-width: thin; scrollbar-color: #30363d transparent; }
    .convergence-ribbon .rung-bar { min-width: 16px; flex-shrink: 0; height: 48px; }

    /* ─── Calibration Radar ─── */
    .calibration-card { padding: 4px 0; }
    .calibration-card .weight-row { display: flex; align-items: center; padding: 3px 0; }
    .drift-meter { height: 6px; border-radius: 3px; background: #21262d; overflow: hidden; }
    .drift-meter-fill { height: 100%; border-radius: 3px; transition: width 300ms ease-out, background-color 300ms; }
    .drift-meter-fill.converging { background: #3fb950; }
    .drift-meter-fill.learning { background: #d29922; }

    /* ─── Stage Pipeline ─── */
    .stage-pipeline { display: flex; gap: 8px; align-items: flex-start; padding: 8px 0; flex-wrap: wrap; }
    .stage-dot { width: 10px; height: 10px; border-radius: 50%; background: #30363d; transition: background 200ms; }
    .stage-dot.active { background: #58a6ff; animation: stage-pulse 1s ease-in-out infinite; }
    .stage-dot.complete { background: #3fb950; }
    @keyframes stage-pulse { 50% { transform: scale(1.3); opacity: 0.7; } }

    /* ─── Fiber Pause Indicator ─── */
    .fiber-paused-indicator {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      padding: 8px 20px; border-radius: 8px;
      background: rgba(210, 153, 34, 0.2); color: #d29922;
      font-size: 14px; font-weight: 700; letter-spacing: 2px;
      pointer-events: none; z-index: 3;
      animation: fiber-pulse 2s ease-in-out infinite;
    }
    @keyframes fiber-pulse { 50% { opacity: 0.5; } }

    #root { height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="dashboard.js"></script>
</body>
</html>
