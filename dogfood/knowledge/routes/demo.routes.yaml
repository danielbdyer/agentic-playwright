kind: harvest-manifest
version: 1
app: demo
baseUrl: fixtures/demo-harness
routes:
  - id: policy-search
    screen: policy-search
    entryUrl: /policy-search.html
    rootSelector: body
    variants:
      - id: default
        url: /policy-search.html
        screen: policy-search
        rootSelector: body
      - id: results-with-policy
        url: /policy-search.html?seed=POL-001
        screen: policy-search
        rootSelector: body
  - id: policy-detail
    screen: policy-detail
    entryUrl: /policy-detail.html?id=POL-001
    rootSelector: body
    variants:
      - id: with-policy
        url: /policy-detail.html?id=POL-001
        screen: policy-detail
        rootSelector: body
  - id: policy-amendment
    screen: policy-amendment
    entryUrl: /policy-amendment.html?id=AMD-001
    rootSelector: body
    variants:
      - id: with-amendment
        url: /policy-amendment.html?id=AMD-001
        screen: policy-amendment
        rootSelector: body
