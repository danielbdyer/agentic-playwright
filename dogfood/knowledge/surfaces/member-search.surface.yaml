screen: member-search
url: /member-search.html
sections:
  search-section:
    selector: "[data-testid='member-search-form']"
    kind: form
    surfaces:
      - member-search-form
      - member-search-actions
      - member-feedback
  results-section:
    selector: "[data-testid='member-results-table']"
    kind: result-set
    surfaces:
      - member-results-grid
surfaces:
  member-search-form:
    kind: form
    section: search-section
    selector: "[data-testid='member-search-form']"
    parents: []
    children:
      - member-search-actions
      - member-feedback
    elements:
      - memberIdInput
      - lastNameInput
      - dateOfBirthInput
    assertions:
      - state
    required: true
  member-search-actions:
    kind: action-cluster
    section: search-section
    selector: "[data-testid='search-member-button']"
    parents:
      - member-search-form
    children: []
    elements:
      - searchMemberButton
    assertions:
      - state
    required: true
  member-feedback:
    kind: validation-region
    section: search-section
    selector: "[data-testid='no-results-message']"
    parents:
      - member-search-form
    children: []
    elements:
      - noResultsMessage
    assertions:
      - state
    required: false
  member-results-grid:
    kind: result-set
    section: results-section
    selector: "[data-testid='member-results-table']"
    parents: []
    children: []
    elements:
      - memberResultsTable
    assertions:
      - structure
      - state
    required: true
