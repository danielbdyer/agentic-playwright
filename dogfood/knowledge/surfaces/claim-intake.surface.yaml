screen: claim-intake
url: /claim-intake.html
sections:
  intake-section:
    selector: "[data-testid='intake-form']"
    kind: form
    surfaces:
      - intake-form
      - intake-actions
      - feedback-surface
surfaces:
  intake-form:
    kind: form
    section: intake-section
    selector: "[data-testid='intake-form']"
    parents: []
    children:
      - intake-actions
      - feedback-surface
    elements:
      - claimantName
      - incidentDate
      - claimAmount
      - claimType
      - description
    assertions:
      - state
    required: true
  intake-actions:
    kind: action-cluster
    section: intake-section
    selector: "[data-testid='intake-actions']"
    parents:
      - intake-form
    children: []
    elements:
      - attachments
      - submitClaim
      - cancelClaim
    assertions:
      - state
    required: true
  feedback-surface:
    kind: validation-region
    section: intake-section
    selector: "[data-testid='confirmation-message']"
    parents:
      - intake-form
    children: []
    elements:
      - confirmationMessage
    assertions:
      - state
    required: false
