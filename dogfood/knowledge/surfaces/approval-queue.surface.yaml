screen: approval-queue
url: /approval-queue.html
sections:
  queue-section:
    selector: "[data-testid='queue-section']"
    kind: result-set
    surfaces:
      - queue-grid
      - queue-actions
      - queue-header
  detail-section:
    selector: "[data-testid='queue-detail']"
    kind: details-pane
    surfaces:
      - queue-details
      - queue-filters
surfaces:
  queue-grid:
    kind: result-set
    section: queue-section
    selector: "[data-testid='queue-table']"
    parents: []
    children: []
    elements:
      - queueTable
    assertions:
      - structure
      - state
    required: true
  queue-actions:
    kind: action-cluster
    section: queue-section
    selector: "[data-testid='queue-actions']"
    parents: []
    children: []
    elements:
      - approveButton
      - rejectButton
    assertions:
      - state
    required: true
  queue-header:
    kind: details-pane
    section: queue-section
    selector: "[data-testid='queue-header']"
    parents: []
    children: []
    elements:
      - itemCount
    assertions:
      - state
    required: true
  queue-details:
    kind: details-pane
    section: detail-section
    selector: "[data-testid='queue-detail']"
    parents: []
    children: []
    elements:
      - commentsTextarea
      - priorityBadge
    assertions:
      - state
    required: false
  queue-filters:
    kind: form
    section: detail-section
    selector: "[data-testid='queue-filters']"
    parents: []
    children: []
    elements:
      - statusFilter
    assertions:
      - state
    required: false
