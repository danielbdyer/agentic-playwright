kind: screen-behavior
version: 1
screen: claim-intake
aliases:
  - claim intake behavior
routeVariantRefs:
  - route-variant:demo:claim-intake:default
  - route-variant:demo:claim-intake:submitted
knowledgeRefs:
  - knowledge/surfaces/claim-intake.surface.yaml
  - knowledge/screens/claim-intake.elements.yaml
  - knowledge/screens/claim-intake.hints.yaml
  - knowledge/screens/claim-intake.postures.yaml
stateNodes:
  - ref: state:claim-intake:form-empty
    screen: claim-intake
    label: Claim intake form is empty
    aliases:
      - form empty
      - blank form
    scope: target
    targetRef: target:element:claim-intake:claimantName
    routeVariantRefs:
      - route-variant:demo:claim-intake:default
    predicates:
      - kind: cleared
        targetRef: target:element:claim-intake:claimantName
        attribute: value
        value: ""
    provenance: []
  - ref: state:claim-intake:form-populated
    screen: claim-intake
    label: Claim intake form has data
    aliases:
      - form filled
      - form populated
    scope: target
    targetRef: target:element:claim-intake:claimantName
    routeVariantRefs:
      - route-variant:demo:claim-intake:default
    predicates:
      - kind: populated
        targetRef: target:element:claim-intake:claimantName
        attribute: value
    provenance: []
  - ref: state:claim-intake:confirmation-visible
    screen: claim-intake
    label: Confirmation message is shown
    aliases:
      - claim submitted
      - confirmation visible
    scope: target
    targetRef: target:element:claim-intake:confirmationMessage
    routeVariantRefs:
      - route-variant:demo:claim-intake:submitted
    predicates:
      - kind: visible
        targetRef: target:element:claim-intake:confirmationMessage
    provenance: []
  - ref: state:claim-intake:confirmation-hidden
    screen: claim-intake
    label: Confirmation message is hidden
    aliases:
      - no confirmation
      - confirmation hidden
    scope: target
    targetRef: target:element:claim-intake:confirmationMessage
    routeVariantRefs:
      - route-variant:demo:claim-intake:default
    predicates:
      - kind: hidden
        targetRef: target:element:claim-intake:confirmationMessage
    provenance: []
eventSignatures:
  - ref: event:claim-intake:enter-claimant-name
    screen: claim-intake
    targetRef: target:element:claim-intake:claimantName
    label: Enter claimant name
    aliases:
      - enter claimant name
      - fill in name
    dispatch:
      action: input
      sampleValue: Jane Smith
    requiredStateRefs: []
    forbiddenStateRefs: []
    effects:
      transitionRefs:
        - transition:claim-intake:populate-claimant
      resultStateRefs:
        - state:claim-intake:form-populated
      observableEffects:
        - value-entry
      assertions:
        - Claimant name field keeps the entered value
    observationPlan:
      timeoutMs: 1500
      settleMs: 50
      observeStateRefs:
        - state:claim-intake:form-populated
    provenance: []
  - ref: event:claim-intake:submit
    screen: claim-intake
    targetRef: target:element:claim-intake:submitClaim
    label: Submit the claim
    aliases:
      - submit claim
      - file claim
    dispatch:
      action: click
    requiredStateRefs:
      - state:claim-intake:form-populated
    forbiddenStateRefs: []
    effects:
      transitionRefs:
        - transition:claim-intake:show-confirmation
      resultStateRefs:
        - state:claim-intake:confirmation-visible
      observableEffects:
        - confirmation-visible
      assertions:
        - Confirmation message appears after successful submission
    observationPlan:
      timeoutMs: 3000
      settleMs: 100
      observeStateRefs:
        - state:claim-intake:confirmation-visible
    provenance: []
transitions:
  - ref: transition:claim-intake:populate-claimant
    screen: claim-intake
    label: Claimant name becomes populated
    aliases:
      - populate claimant
    eventSignatureRef: event:claim-intake:enter-claimant-name
    sourceStateRefs:
      - state:claim-intake:form-empty
    targetStateRefs:
      - state:claim-intake:form-populated
    effectKind: populate
    observableEffects:
      - value-entry
    provenance: []
  - ref: transition:claim-intake:show-confirmation
    screen: claim-intake
    label: Claim submission shows confirmation
    aliases:
      - show confirmation
    eventSignatureRef: event:claim-intake:submit
    sourceStateRefs:
      - state:claim-intake:form-populated
    targetStateRefs:
      - state:claim-intake:confirmation-visible
    effectKind: reveal
    observableEffects:
      - confirmation-visible
    provenance: []
