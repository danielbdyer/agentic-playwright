kind: screen-behavior
version: 1
screen: dashboard
aliases:
  - dashboard behavior
routeVariantRefs:
  - route-variant:demo:dashboard:default
knowledgeRefs:
  - knowledge/surfaces/dashboard.surface.yaml
  - knowledge/screens/dashboard.elements.yaml
  - knowledge/screens/dashboard.hints.yaml
  - knowledge/screens/dashboard.postures.yaml
stateNodes:
  - ref: state:dashboard:summary-loaded
    screen: dashboard
    label: Summary cards are loaded with data
    aliases:
      - summary loaded
      - dashboard loaded
    scope: target
    targetRef: target:element:dashboard:summaryCards
    routeVariantRefs:
      - route-variant:demo:dashboard:default
    predicates:
      - kind: visible
        targetRef: target:element:dashboard:summaryCards
    provenance: []
  - ref: state:dashboard:activity-visible
    screen: dashboard
    label: Recent activity table is visible
    aliases:
      - activity visible
      - activity table shown
    scope: target
    targetRef: target:element:dashboard:recentActivityTable
    routeVariantRefs:
      - route-variant:demo:dashboard:default
    predicates:
      - kind: visible
        targetRef: target:element:dashboard:recentActivityTable
    provenance: []
  - ref: state:dashboard:alerts-visible
    screen: dashboard
    label: Alerts panel is visible
    aliases:
      - alerts visible
      - notifications shown
    scope: target
    targetRef: target:element:dashboard:alertsPanel
    routeVariantRefs:
      - route-variant:demo:dashboard:default
    predicates:
      - kind: visible
        targetRef: target:element:dashboard:alertsPanel
    provenance: []
  - ref: state:dashboard:alerts-hidden
    screen: dashboard
    label: Alerts panel is hidden
    aliases:
      - no alerts
      - alerts hidden
    scope: target
    targetRef: target:element:dashboard:alertsPanel
    routeVariantRefs: []
    predicates:
      - kind: hidden
        targetRef: target:element:dashboard:alertsPanel
    provenance: []
eventSignatures: []
transitions: []
