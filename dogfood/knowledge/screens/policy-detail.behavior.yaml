kind: screen-behavior
version: 1
screen: policy-detail
aliases:
  - policy detail behavior
routeVariantRefs:
  - route-variant:demo:policy-detail:with-policy
knowledgeRefs:
  - knowledge/surfaces/policy-detail.surface.yaml
  - knowledge/screens/policy-detail.elements.yaml
  - knowledge/screens/policy-detail.hints.yaml
  - knowledge/screens/policy-detail.postures.yaml
stateNodes:
  - ref: state:policy-detail:detail-loaded
    screen: policy-detail
    label: Policy detail panel is visible with data
    aliases:
      - policy detail loaded
      - detail panel visible
    scope: target
    targetRef: target:element:policy-detail:policyNumber
    routeVariantRefs:
      - route-variant:demo:policy-detail:with-policy
    predicates:
      - kind: visible
        targetRef: target:element:policy-detail:policyNumber
    provenance: []
  - ref: state:policy-detail:detail-hidden
    screen: policy-detail
    label: Policy detail panel is hidden
    aliases:
      - detail not shown
      - detail hidden
    scope: target
    targetRef: target:element:policy-detail:policyNumber
    routeVariantRefs: []
    predicates:
      - kind: hidden
        targetRef: target:element:policy-detail:policyNumber
    provenance: []
  - ref: state:policy-detail:claims-visible
    screen: policy-detail
    label: Claims table is visible
    aliases:
      - claims visible
      - claims table shown
    scope: target
    targetRef: target:element:policy-detail:claimsTable
    routeVariantRefs:
      - route-variant:demo:policy-detail:with-policy
    predicates:
      - kind: visible
        targetRef: target:element:policy-detail:claimsTable
    provenance: []
  - ref: state:policy-detail:claims-hidden
    screen: policy-detail
    label: Claims table is hidden
    aliases:
      - no claims visible
      - claims hidden
    scope: target
    targetRef: target:element:policy-detail:claimsTable
    routeVariantRefs: []
    predicates:
      - kind: hidden
        targetRef: target:element:policy-detail:claimsTable
    provenance: []
  - ref: state:policy-detail:error-visible
    screen: policy-detail
    label: Error panel is visible
    aliases:
      - error shown
      - policy not found error
    scope: target
    targetRef: target:element:policy-detail:errorPanel
    routeVariantRefs: []
    predicates:
      - kind: visible
        targetRef: target:element:policy-detail:errorPanel
    provenance: []
  - ref: state:policy-detail:error-hidden
    screen: policy-detail
    label: Error panel is hidden
    aliases:
      - no error
      - error hidden
    scope: target
    targetRef: target:element:policy-detail:errorPanel
    routeVariantRefs:
      - route-variant:demo:policy-detail:with-policy
    predicates:
      - kind: hidden
        targetRef: target:element:policy-detail:errorPanel
    provenance: []
eventSignatures: []
transitions: []
