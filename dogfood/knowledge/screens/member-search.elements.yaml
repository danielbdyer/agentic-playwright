screen: member-search
url: /member-search.html
elements:
  memberIdInput:
    role: textbox
    name: Member ID
    testId: member-id-input
    surface: member-search-form
    widget: os-input
    required: false
  lastNameInput:
    role: textbox
    name: Last Name
    testId: last-name-input
    surface: member-search-form
    widget: os-input
    required: false
  dateOfBirthInput:
    role: textbox
    name: Date of Birth
    testId: dob-input
    surface: member-search-form
    widget: os-input
    required: false
  searchMemberButton:
    role: button
    name: Search Members
    testId: search-member-button
    surface: member-search-actions
    widget: os-button
    required: true
  memberResultsTable:
    role: table
    name: Member Results
    testId: member-results-table
    surface: member-results-grid
    widget: os-table
    required: true
  noResultsMessage:
    role: alert
    name: null
    testId: no-results-message
    surface: member-feedback
    widget: os-region
    required: false
