kind: screen-behavior
version: 1
screen: policy-search
aliases:
  - policy search behavior
routeVariantRefs:
  - route-variant:demo:policy-search:default
  - route-variant:demo:policy-search:results-with-policy
knowledgeRefs:
  - knowledge/surfaces/policy-search.surface.yaml
  - knowledge/screens/policy-search.elements.yaml
  - knowledge/screens/policy-search.hints.yaml
  - knowledge/screens/policy-search.postures.yaml
stateNodes:
  - ref: state:policy-search:policy-number-cleared
    screen: policy-search
    label: Policy number field is cleared
    aliases:
      - policy number empty
      - search field empty
    scope: target
    targetRef: target:element:policy-search:policyNumberInput
    routeVariantRefs:
      - route-variant:demo:policy-search:default
    predicates:
      - kind: cleared
        targetRef: target:element:policy-search:policyNumberInput
        attribute: value
        value: ""
    provenance: []
  - ref: state:policy-search:policy-number-populated
    screen: policy-search
    label: Policy number field is populated
    aliases:
      - policy number entered
      - policy number populated
      - policy ref entered
    scope: target
    targetRef: target:element:policy-search:policyNumberInput
    routeVariantRefs:
      - route-variant:demo:policy-search:default
      - route-variant:demo:policy-search:results-with-policy
    predicates:
      - kind: populated
        targetRef: target:element:policy-search:policyNumberInput
        attribute: value
    provenance: []
  - ref: state:policy-search:results-hidden
    screen: policy-search
    label: Search results are hidden
    aliases:
      - no search results visible
      - results hidden
    scope: target
    targetRef: target:element:policy-search:resultsTable
    routeVariantRefs:
      - route-variant:demo:policy-search:default
    predicates:
      - kind: hidden
        targetRef: target:element:policy-search:resultsTable
    provenance: []
  - ref: state:policy-search:results-visible
    screen: policy-search
    label: Search results are visible
    aliases:
      - results visible
      - search results visible
      - matching policy appears in search results
    scope: target
    targetRef: target:element:policy-search:resultsTable
    routeVariantRefs:
      - route-variant:demo:policy-search:results-with-policy
    predicates:
      - kind: visible
        targetRef: target:element:policy-search:resultsTable
    provenance: []
  - ref: state:policy-search:validation-hidden
    screen: policy-search
    label: Validation summary is hidden
    aliases:
      - validation hidden
      - no validation summary shown
    scope: target
    targetRef: target:element:policy-search:validationSummary
    routeVariantRefs:
      - route-variant:demo:policy-search:default
      - route-variant:demo:policy-search:results-with-policy
    predicates:
      - kind: hidden
        targetRef: target:element:policy-search:validationSummary
    provenance: []
  - ref: state:policy-search:validation-visible
    screen: policy-search
    label: Validation summary is visible
    aliases:
      - validation visible
      - error summary shown
      - no matching policy found
    scope: target
    targetRef: target:element:policy-search:validationSummary
    routeVariantRefs:
      - route-variant:demo:policy-search:default
    predicates:
      - kind: visible
        targetRef: target:element:policy-search:validationSummary
    provenance: []
eventSignatures:
  - ref: event:policy-search:enter-policy-number
    screen: policy-search
    targetRef: target:element:policy-search:policyNumberInput
    label: Enter policy number
    aliases:
      - enter policy number
      - enter policy number in search field
      - enter policy ref
    dispatch:
      action: input
      sampleValue: POL-001
    requiredStateRefs: []
    forbiddenStateRefs: []
    effects:
      transitionRefs:
        - transition:policy-search:populate-policy-number
        - transition:policy-search:hide-validation-on-input
      resultStateRefs:
        - state:policy-search:policy-number-populated
        - state:policy-search:validation-hidden
      observableEffects:
        - value-entry
        - validation-cleared
      assertions:
        - Policy number field keeps the entered value
        - Validation summary stays hidden after valid input
    observationPlan:
      timeoutMs: 1500
      settleMs: 50
      observeStateRefs:
        - state:policy-search:policy-number-populated
        - state:policy-search:validation-hidden
    provenance: []
  - ref: event:policy-search:click-search
    screen: policy-search
    targetRef: target:element:policy-search:searchButton
    label: Click search button
    aliases:
      - click search
      - click search button
      - search runs
    dispatch:
      action: click
    requiredStateRefs:
      - state:policy-search:policy-number-populated
    forbiddenStateRefs: []
    effects:
      transitionRefs:
        - transition:policy-search:show-results
        - transition:policy-search:show-validation
      resultStateRefs:
        - state:policy-search:results-visible
        - state:policy-search:results-hidden
        - state:policy-search:validation-visible
        - state:policy-search:validation-hidden
      observableEffects:
        - result-set-visible
        - validation-visible
      assertions:
        - Search yields either visible results or a visible validation summary
        - Search keeps the result and validation surfaces mutually exclusive
    observationPlan:
      timeoutMs: 1500
      settleMs: 50
      observeStateRefs:
        - state:policy-search:results-visible
        - state:policy-search:results-hidden
        - state:policy-search:validation-visible
        - state:policy-search:validation-hidden
    provenance: []
transitions:
  - ref: transition:policy-search:populate-policy-number
    screen: policy-search
    label: Policy number becomes populated
    aliases:
      - populate policy number
    eventSignatureRef: event:policy-search:enter-policy-number
    sourceStateRefs:
      - state:policy-search:policy-number-cleared
    targetStateRefs:
      - state:policy-search:policy-number-populated
    effectKind: populate
    observableEffects:
      - value-entry
    provenance: []
  - ref: transition:policy-search:hide-validation-on-input
    screen: policy-search
    label: Validation summary hides while typing
    aliases:
      - hide validation on input
    eventSignatureRef: event:policy-search:enter-policy-number
    sourceStateRefs:
      - state:policy-search:validation-visible
    targetStateRefs:
      - state:policy-search:validation-hidden
    effectKind: hide
    observableEffects:
      - validation-cleared
    provenance: []
  - ref: transition:policy-search:show-results
    screen: policy-search
    label: Search reveals matching results
    aliases:
      - reveal search results
      - show results
    eventSignatureRef: event:policy-search:click-search
    sourceStateRefs:
      - state:policy-search:policy-number-populated
    targetStateRefs:
      - state:policy-search:results-visible
      - state:policy-search:validation-hidden
    effectKind: reveal
    observableEffects:
      - result-set-visible
    provenance: []
  - ref: transition:policy-search:show-validation
    screen: policy-search
    label: Search reveals validation summary
    aliases:
      - reveal validation summary
      - show validation
    eventSignatureRef: event:policy-search:click-search
    sourceStateRefs:
      - state:policy-search:policy-number-populated
    targetStateRefs:
      - state:policy-search:validation-visible
      - state:policy-search:results-hidden
    effectKind: reveal
    observableEffects:
      - validation-visible
    provenance: []
