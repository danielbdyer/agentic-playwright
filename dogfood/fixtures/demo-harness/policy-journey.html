<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Policy Journey</title>
    <style>
      :root {
        color-scheme: light;
        --page-ink: #102331;
        --muted-ink: #4f6472;
        --panel-edge: rgba(16, 35, 49, 0.1);
        --panel-fill: rgba(255, 255, 255, 0.9);
        --card-shadow: 0 28px 64px rgba(16, 35, 49, 0.12);
        font-family: "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--page-ink);
        background:
          radial-gradient(circle at top left, rgba(255, 252, 232, 0.95), transparent 36%),
          radial-gradient(circle at top right, rgba(211, 240, 251, 0.95), transparent 32%),
          linear-gradient(180deg, #eef5f7 0%, #dde7ec 100%);
      }

      #app {
        min-height: 100vh;
      }

      .journey-page {
        width: min(1120px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 40px 0 72px;
      }

      .hero-panel,
      .callout-card,
      .journey-shell {
        border: 1px solid var(--panel-edge);
        background: var(--panel-fill);
        box-shadow: var(--card-shadow);
      }

      .hero-panel {
        border-radius: 28px;
        padding: 28px;
      }

      .hero-kicker,
      .callout-eyebrow,
      .step-label,
      .status-kicker {
        margin: 0 0 10px;
        font-size: 0.8rem;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .hero-panel h1,
      .callout-card h2,
      .step-copy h2 {
        margin: 0;
      }

      .hero-copy {
        max-width: 62ch;
        color: var(--muted-ink);
      }

      .badge-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 20px;
      }

      .badge-chip {
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(16, 35, 49, 0.07);
        font-size: 0.9rem;
      }

      .callout-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 16px;
        margin: 20px 0;
      }

      .callout-card {
        border-radius: 22px;
        padding: 18px 20px;
      }

      .callout-card p:last-child {
        margin-bottom: 0;
        color: var(--muted-ink);
      }

      .fuzz-shell {
        padding: 10px;
        border-radius: 30px;
        background: rgba(255, 255, 255, 0.24);
      }

      .fuzz-shell-2 {
        background: rgba(255, 255, 255, 0.32);
      }

      .fuzz-shell-3 {
        background: rgba(255, 255, 255, 0.4);
      }

      .journey-shell {
        border-radius: 30px;
        padding: 26px;
      }

      .journey-shell.tone-reef {
        background:
          linear-gradient(135deg, rgba(229, 244, 240, 0.95), rgba(255, 255, 255, 0.92));
      }

      .journey-shell.tone-ember {
        background:
          linear-gradient(135deg, rgba(251, 240, 226, 0.95), rgba(255, 255, 255, 0.92));
      }

      .journey-shell.tone-atlas {
        background:
          linear-gradient(135deg, rgba(230, 238, 250, 0.95), rgba(255, 255, 255, 0.92));
      }

      .journey-shell.density-layered .step-layout {
        gap: 24px;
      }

      .journey-shell.density-stacked .step-layout {
        gap: 28px;
      }

      .progress-rail {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 18px;
      }

      .progress-pill {
        padding: 8px 12px;
        border-radius: 999px;
        border: 1px solid rgba(16, 35, 49, 0.14);
        background: rgba(255, 255, 255, 0.6);
      }

      .progress-pill.is-active {
        background: #113d5a;
        color: #fff;
        border-color: #113d5a;
      }

      .step-layout {
        display: grid;
        gap: 20px;
      }

      .step-card {
        border-radius: 24px;
        border: 1px solid rgba(16, 35, 49, 0.08);
        background: rgba(255, 255, 255, 0.86);
        padding: 22px;
      }

      .step-card.is-hidden {
        display: none;
      }

      .step-copy p:last-child {
        color: var(--muted-ink);
      }

      .field-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 16px;
      }

      .field-stack {
        display: grid;
        gap: 8px;
        margin: 16px 0;
      }

      .field-stack span {
        font-weight: 700;
      }

      .text-field,
      .primary-button,
      .secondary-button {
        font: inherit;
      }

      .text-field {
        width: 100%;
        padding: 12px 14px;
        border-radius: 14px;
        border: 1px solid rgba(16, 35, 49, 0.18);
        background: #fff;
      }

      .status-card,
      .review-summary,
      .validation-panel {
        border-radius: 18px;
        border: 1px solid rgba(16, 35, 49, 0.12);
        padding: 16px;
      }

      .status-card,
      .review-summary {
        background: rgba(255, 255, 255, 0.72);
      }

      .summary-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 12px;
        margin: 0;
      }

      .summary-grid div,
      .review-list li {
        color: var(--muted-ink);
      }

      dt {
        font-weight: 700;
        color: var(--page-ink);
      }

      dd {
        margin: 4px 0 0;
      }

      .status-guidance,
      .return-note {
        color: var(--muted-ink);
      }

      .validation-panel {
        margin-top: 16px;
        color: #8b1f11;
        background: rgba(255, 241, 236, 0.92);
      }

      .validation-panel[hidden] {
        display: none !important;
      }

      .action-row {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 20px;
      }

      .primary-button,
      .secondary-button {
        padding: 12px 18px;
        border-radius: 999px;
        cursor: pointer;
      }

      .primary-button {
        border: none;
        background: #0d5c63;
        color: #fff;
        font-weight: 700;
      }

      .secondary-button {
        border: 1px solid rgba(16, 35, 49, 0.18);
        background: rgba(255, 255, 255, 0.75);
        color: var(--page-ink);
      }

      .review-list {
        margin: 0;
        padding-left: 18px;
      }

      .review-list li + li {
        margin-top: 10px;
      }

      @media (max-width: 720px) {
        .journey-page {
          width: min(100vw - 20px, 1120px);
          padding-top: 20px;
        }

        .hero-panel,
        .journey-shell,
        .step-card {
          padding: 18px;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/policy-journey.js"></script>
  </body>
</html>
