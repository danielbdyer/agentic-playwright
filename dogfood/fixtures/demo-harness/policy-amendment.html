<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Policy Amendment</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at top left, #f7fbff 0%, #eef3f7 45%, #e2ebf1 100%);
        color: #0c2231;
      }

      main {
        max-width: 960px;
        margin: 0 auto;
        padding: 48px 24px 80px;
      }

      .card {
        background: rgba(255, 255, 255, 0.92);
        border: 1px solid rgba(12, 34, 49, 0.08);
        border-radius: 20px;
        box-shadow: 0 24px 60px rgba(12, 34, 49, 0.08);
        padding: 24px;
      }

      .layout {
        display: grid;
        gap: 24px;
      }

      .field-grid {
        display: grid;
        grid-template-columns: 160px 1fr;
        gap: 12px 24px;
        align-items: baseline;
      }

      .field-label {
        font-weight: 700;
        letter-spacing: 0.02em;
      }

      a {
        color: #0d5c63;
        font-weight: 600;
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
      }

      .ErrorMessage {
        color: #9d1c1c;
        font-weight: 600;
      }

      [hidden] {
        display: none !important;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        padding: 12px 14px;
        border-bottom: 1px solid #d3dfe6;
        text-align: left;
      }

      thead {
        background: #edf5f6;
      }

      .status-badge {
        display: inline-block;
        padding: 4px 12px;
        border-radius: 999px;
        font-weight: 600;
        font-size: 0.875rem;
      }

      .status-pending {
        background: #fff3cd;
        color: #856404;
      }

      .status-approved {
        background: #d4edda;
        color: #155724;
      }

      button {
        background: #0d5c63;
        color: white;
        border: none;
        border-radius: 8px;
        padding: 10px 24px;
        font-weight: 600;
        font-size: 1rem;
        cursor: pointer;
      }

      button:hover {
        background: #0a484e;
      }
    </style>
  </head>
  <body>
    <main class="layout">
      <header class="card">
        <h1>Policy Amendment</h1>
        <p>
          <a href="policy-detail.html?id=POL-001" data-testid="back-to-detail">
            &larr; Back to Policy Detail
          </a>
        </p>
      </header>

      <section
        id="error-panel"
        data-testid="error-panel"
        class="card ErrorMessage"
        role="alert"
        hidden
      >
        Amendment not found.
      </section>

      <section
        id="amendment-panel"
        data-testid="amendment-panel"
        class="card"
        aria-label="Amendment Details"
        hidden
      >
        <div class="field-grid">
          <span class="field-label">Amendment Number</span>
          <span id="amendment-number" data-testid="amendment-number" aria-label="Amendment Number"></span>

          <span class="field-label">Amendment Status</span>
          <span id="amendment-status" data-testid="amendment-status" aria-label="Amendment Status"></span>

          <span class="field-label">Effective Date</span>
          <span id="effective-date" data-testid="effective-date" aria-label="Effective Date"></span>
        </div>
      </section>

      <section
        id="claims-impact-panel"
        data-testid="claims-impact-panel"
        class="card"
        aria-label="Claims Impact"
        hidden
      >
        <h2>Impacted Claims</h2>
        <table
          aria-label="Impacted Claims"
          data-testid="impacted-claims-table"
          id="impacted-claims-table"
        >
          <thead>
            <tr>
              <th scope="col">Claim ID</th>
              <th scope="col">Impact</th>
              <th scope="col">Adjustment</th>
            </tr>
          </thead>
          <tbody id="claims-body"></tbody>
        </table>
      </section>

      <section id="actions-panel" class="card" aria-label="Amendment Actions" hidden>
        <button
          id="review-button"
          data-testid="review-button"
          aria-label="Submit Review"
          type="button"
        >
          Submit Review
        </button>
      </section>
    </main>

    <script>
      (function bootstrap() {
        var amendments = {
          'AMD-001': {
            number: 'AMD-001',
            status: 'Pending Review',
            effectiveDate: '2025-03-01',
            impactedClaims: [
              { id: 'CLM-101', impact: 'Coverage adjusted', adjustment: '+$500.00' },
              { id: 'CLM-102', impact: 'Deductible changed', adjustment: '-$100.00' },
            ],
          },
        };

        var params = new URL(window.location.href).searchParams;
        var amendmentId = (params.get('id') || '').toUpperCase();

        var errorPanel = document.getElementById('error-panel');
        var amendmentPanel = document.getElementById('amendment-panel');
        var claimsImpactPanel = document.getElementById('claims-impact-panel');
        var actionsPanel = document.getElementById('actions-panel');
        var amendmentNumberEl = document.getElementById('amendment-number');
        var amendmentStatusEl = document.getElementById('amendment-status');
        var effectiveDateEl = document.getElementById('effective-date');
        var claimsBody = document.getElementById('claims-body');
        var reviewButton = document.getElementById('review-button');

        function renderAmendment(amendment) {
          amendmentNumberEl.textContent = amendment.number;

          var statusClass = amendment.status === 'Pending Review' ? 'status-pending' : 'status-approved';
          amendmentStatusEl.innerHTML =
            '<span class="status-badge ' + statusClass + '">' + amendment.status + '</span>';

          effectiveDateEl.textContent = amendment.effectiveDate;
          amendmentPanel.hidden = false;
          actionsPanel.hidden = false;

          if (amendment.impactedClaims && amendment.impactedClaims.length > 0) {
            claimsBody.innerHTML = '';
            amendment.impactedClaims.forEach(function (claim) {
              var row = document.createElement('tr');
              row.innerHTML =
                '<td>' + claim.id + '</td>' +
                '<td>' + claim.impact + '</td>' +
                '<td>' + claim.adjustment + '</td>';
              claimsBody.appendChild(row);
            });
            claimsImpactPanel.hidden = false;
          }
        }

        if (reviewButton) {
          reviewButton.addEventListener('click', function () {
            amendmentStatusEl.innerHTML =
              '<span class="status-badge status-approved">Approved</span>';
            reviewButton.disabled = true;
            reviewButton.textContent = 'Review Submitted';
          });
        }

        if (!amendmentId) {
          errorPanel.hidden = false;
          return;
        }

        var amendment = amendments[amendmentId];
        if (amendment) {
          renderAmendment(amendment);
        } else {
          errorPanel.hidden = false;
        }
      })();
    </script>
  </body>
</html>
