# Fixture specification for the `intent-fetch` verb.
# Grammar: docs/v2-readiness.md §4.

verb: intent-fetch
schemaVersion: 1

fixtures:
  - name: fetch-testbed-work-item-succeeds
    description: |
      Fetch a known work item from the in-repo testbed source.
      Exercises the happy source-dispatch path: testbed adapter
      resolves, payload returns, rev metadata stamps.
    input:
      source: testbed
      id: "WORK-001"
    expected:
      classification: matched
      error-family: null
    exercises:
      - rung: testbed-source
      - error-family: null

  - name: fetch-retries-exhausted-fails-rate-limited
    description: |
      ADO returns HTTP 429 and the retry schedule exhausts without
      a successful attempt. Exercises the rate-limited classification
      path from the resilience retry envelope. The
      `simulate-rate-limit` hook triggers the family at rung 2.
    input:
      source: ado
      id: "999999"
    world-setup:
      simulate-rate-limit: true
    expected:
      classification: failed
      error-family: rate-limited
    exercises:
      - error-family: rate-limited

  - name: fetch-transport-fails-unavailable
    description: |
      The ADO endpoint is unreachable (connection refused, DNS
      failure, abort). Transport-level failure maps to the
      unavailable error family per the AdoTransientError path.
      The `simulate-transport-failure` hook triggers the family
      at rung 2.
    input:
      source: ado
      id: "42"
    world-setup:
      simulate-transport-failure: true
    expected:
      classification: failed
      error-family: unavailable
    exercises:
      - error-family: unavailable

  - name: fetch-malformed-payload-fails-malformed-response
    description: |
      Resolves Gap 2 from probe-spike-verdict-01. ADO responds with
      HTTP 200 but the payload violates the expected schema (e.g.
      missing fields, wrong types). Classification routes through
      the malformed-response family. Under rung-2 (fixture-replay)
      the classifier honors the `inject-malformed-payload` world-
      setup hook to simulate this path deterministically — no
      live network, no schema-break injection machinery needed
      until the classifier lands at Step 5.6.
    input:
      source: ado
      id: "7"
    world-setup:
      inject-malformed-payload: true
    expected:
      classification: failed
      error-family: malformed-response
    exercises:
      - error-family: malformed-response
