# Fixture specification for the `intent-fetch` verb.
# Grammar: docs/v2-readiness.md §4.
#
# Not browser-bound. The world is upstream-API state; the rung-2
# classifier honors `world.upstream.*` flags to simulate each
# declared failure family.

verb: intent-fetch
schemaVersion: 1

fixtures:
  - name: fetch-testbed-work-item-succeeds
    description: |
      Happy path via the in-repo testbed source. Source-dispatch
      resolves 'testbed'; payload returns; rev metadata stamps.
    input:
      source: testbed
      id: "WORK-001"
    expected:
      classification: matched
      error-family: null
    exercises:
      - rung: testbed-source

  - name: fetch-retries-exhausted-fails-rate-limited
    description: |
      ADO returns HTTP 429 and the retry schedule exhausts.
      Classification routes through the rate-limited family.
    input:
      source: ado
      id: "999999"
    world:
      upstream:
        rate-limited: true
    expected:
      classification: failed
      error-family: rate-limited
    exercises:
      - error-family: rate-limited

  - name: fetch-transport-fails-unavailable
    description: |
      ADO endpoint unreachable (connection refused / DNS / abort).
      Transport-level failure maps to the unavailable family.
    input:
      source: ado
      id: "42"
    world:
      upstream:
        transport-failure: true
    expected:
      classification: failed
      error-family: unavailable
    exercises:
      - error-family: unavailable

  - name: fetch-malformed-payload-fails-malformed-response
    description: |
      ADO returns HTTP 200 but the payload violates the expected
      schema (missing fields, wrong types). Classification routes
      through malformed-response.
    input:
      source: ado
      id: "7"
    world:
      upstream:
        malformed-payload: true
    expected:
      classification: failed
      error-family: malformed-response
    exercises:
      - error-family: malformed-response
