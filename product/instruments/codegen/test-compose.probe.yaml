# Fixture specification for the `test-compose` verb.
# Grammar: docs/v2-readiness.md §4.
#
# test-compose is not browser-bound. Its "world" is the input shape
# itself — the handler's validator accepts or rejects. No substrate
# DOM, no world.surfaces.

verb: test-compose
schemaVersion: 1

fixtures:
  - name: valid-shape-succeeds
    description: |
      Input carries the required { flow, imports: { fixtures,
      scenarioContext } } shape. The handler's validator accepts;
      classification is matched.
    input:
      flow:
        name: sample-flow
        steps: []
      imports:
        fixtures: ./fixtures
        scenarioContext: ./scenario-context
    expected:
      classification: matched
      error-family: null
    exercises:
      - rung: validator

  - name: missing-imports-fails-shape-validation
    description: |
      Input lacks the required `imports` object. The handler's
      validator rejects — classification: failed, error-family:
      assertion-like (the validator IS an assertion).
    input:
      flow:
        name: incomplete
        steps: []
    expected:
      classification: failed
      error-family: assertion-like
    exercises:
      - error-family: assertion-like
