# Fixture specification for the `test-compose` verb.
# Grammar: docs/v2-readiness.md §4.

verb: test-compose
schemaVersion: 1

fixtures:
  - name: three-step-grounded-flow
    description: |
      Compose a Playwright test from a minimal 3-step grounded
      flow. Exercises the handler-level shape validator: input
      carries the required `{ flow, imports }` pair at top level.
      Rung-2 (fixture-replay) classifies on shape; rung-3+ will
      validate the GroundedSpecFlow metadata and the emitted AST.
    input:
      flow:
        name: policy-search-happy-path
        screen: policy-search
        steps:
          - kind: navigate
            route: /policy-search
          - kind: enter
            facet: policy-search:policyNumberInput
            value: POL-001
          - kind: click
            facet: policy-search:searchButton
      imports:
        fixtures: ./fixtures
        scenarioContext: ./scenario-context
    expected:
      classification: matched
      error-family: null
    exercises:
      - rung: pregenerated-facade
      - error-family: null

  - name: missing-imports-fails-shape-validation
    description: |
      Input omits the required `imports` object. The handler's
      shape validator rejects — classification: failed, error-
      family: assertion-like (the validator IS an assertion; Gap-4
      resolution in probe-spike-verdict-02 widened test-compose's
      manifest error families to declare assertion-like).
    input:
      flow:
        name: policy-search-broken-path
        screen: policy-search
        steps:
          - kind: click
            facet: policy-search:DOES_NOT_EXIST
    expected:
      classification: failed
      error-family: assertion-like
    exercises:
      - error-family: assertion-like
