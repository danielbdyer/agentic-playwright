# Fixture specification for the `observe` verb.
# Grammar: docs/v2-readiness.md §4 (first-principles revision,
# Step-6 F3).
#
# Vocabulary: target declares what the verb is asked to observe
# (role + name); world.surfaces declares the substrate's actual
# DOM state. The two coincide in the happy path; divergence
# (target present in query but hidden in substrate) drives the
# declared failure families.

verb: observe
schemaVersion: 1

fixtures:
  - name: visible-button
    description: |
      Observe a visible button. The substrate renders a button
      matching the target's role + name; classifier's ARIA query
      resolves; classification is matched. The entropy profile
      wraps the button in randomized chrome (nested wrappers,
      tone/density classes, sibling jitter, callout + badge
      decoration) — the classifier's outcome must be invariant
      under this chrome perturbation.
    input:
      target: { role: button, name: "Action A" }
    world:
      surfaces:
        - { role: button, name: "Action A" }
      entropy:
        seed: observe-visible-button
        wrapperDepth: [1, 3]
        chromeTone: [reef, ember, atlas]
        spacingDensity: [tidy, layered]
        siblingJitter: [0, 2]
        calloutShuffle: { count: 3 }
        badgeSubset: [2, 4]
    expected:
      classification: matched
      error-family: null
    exercises:
      - rung: role

  - name: hidden-target-fails-not-visible
    description: |
      The target button exists in the DOM but renders with
      display:none. Excluded from the accessibility tree, so
      getByRole times out — classifier maps the timeout to the
      not-visible family. Entropy chrome surrounds the hidden
      target; the not-visible verdict holds regardless.
    input:
      target: { role: button, name: "Action B" }
    world:
      surfaces:
        - { role: button, name: "Action B", visibility: display-none }
      entropy:
        seed: observe-hidden-button
        wrapperDepth: [2, 2]
        chromeTone: [quartz]
        siblingJitter: [1, 3]
    expected:
      classification: failed
      error-family: not-visible
    exercises:
      - error-family: not-visible

  - name: observe-nested-tab-in-tablist
    description: |
      Observe a tab deep inside a composed ARIA topology:
      main → tablist → tab. Tests that getByRole resolves through
      realistic accessibility-tree nesting. The name query
      disambiguates which tab among the two at the same depth.
    input:
      target: { role: tab, name: "Details" }
    world:
      surfaces:
        - role: main
          name: "Account"
          children:
            - role: tablist
              name: "Account sections"
              children:
                - { role: tab, name: "Overview" }
                - { role: tab, name: "Details" }
      entropy:
        seed: observe-nested-tab
        wrapperDepth: [1, 2]
        chromeTone: [atlas]
    expected:
      classification: matched
      error-family: null
    exercises:
      - rung: role
      - composition: nested
