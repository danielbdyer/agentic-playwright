# Fixture specification for the `facet-query` verb.
# Grammar: docs/v2-readiness.md §4.
#
# facet-query's discriminator is `by`. Not browser-bound — the
# "world" is catalog state; classifier checks input shape.

verb: facet-query
schemaVersion: 1

fixtures:
  - name: lookup-by-id
    description: |
      Resolve by stable ID — the primary index path. Shape valid
      (by=id, id is a string); classification matched. Empty-
      result responses also classify as matched (see
      missing-id-returns-empty below).
    input:
      by: id
      id: ns:exampleA
    expected:
      classification: matched
      error-family: null
    exercises:
      - rung: id-index

  - name: lookup-by-intent-phrase
    description: |
      Resolve by observed intent phrase — the alias-index path.
    input:
      by: intent-phrase
      phrase: "Example field"
    expected:
      classification: matched
      error-family: null
    exercises:
      - rung: alias-index

  - name: missing-id-returns-empty
    description: |
      Query for an ID not in the catalog. Zero matches is a
      matched classification — query's declared error family is
      unclassified only; absence is a success.
    input:
      by: id
      id: ns:doesNotExist
    expected:
      classification: matched
      error-family: null
    exercises:
      - rung: id-index
