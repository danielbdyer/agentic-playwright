# Fixture specification for the `facet-mint` verb.
# Grammar: docs/v2-readiness.md §4.
#
# Not browser-bound. The world is catalog state; the rung-2
# classifier honors `world.catalog.facet-exists-at-stable-id`
# to simulate the ID-collision precondition.

verb: facet-mint
schemaVersion: 1

fixtures:
  - name: mint-new-facet-succeeds
    description: |
      Mint a fresh element-kind facet at a never-seen stable ID.
      Happy mint path — ID check clears, provenance stamps,
      record lands with atomic-at-mint evidence.
    input:
      facet-kind: element
      stable-id: ns:freshElementA
      display-name: Fresh Element A
      minting-instrument: agent-observation
    expected:
      classification: matched
      error-family: null
    exercises:
      - rung: mint

  - name: mint-duplicate-id-fails-assertion
    description: |
      The catalog already has a record at this stable ID. The
      pre-image collision is detected before provenance stamping
      and routes to assertion-like.
    input:
      facet-kind: element
      stable-id: ns:existingElementB
      display-name: Colliding Element B
      minting-instrument: agent-observation
    world:
      catalog:
        facet-exists-at-stable-id: true
    expected:
      classification: failed
      error-family: assertion-like
    exercises:
      - error-family: assertion-like
