# Fixture specification for the `facet-enrich` verb.
# Grammar: docs/v2-readiness.md §4.
#
# Not browser-bound. The world is catalog state; the rung-2
# classifier honors `world.catalog.facet-missing` to simulate
# the absent-facet precondition.

verb: facet-enrich
schemaVersion: 1

fixtures:
  - name: enrich-adds-new-alias
    description: |
      Append a newly-observed alias to an existing facet. Happy
      path — evidence count increments, aliases reorder by count
      descending, stable ID preserved.
    input:
      facet-kind: element
      facet-id: ns:existingElementA
      evidence:
        kind: alias-observed
        phrase: "Alt name for A"
    expected:
      classification: matched
      error-family: null
    exercises:
      - rung: alias-merge

  - name: enrich-unknown-id-fails-assertion
    description: |
      Target facet is absent from the catalog. enrich refuses to
      materialize records for unknown IDs — mint is the only path
      that admits new ones. Assertion-like.
    input:
      facet-kind: element
      facet-id: ns:nonexistent
      evidence:
        kind: alias-observed
        phrase: "Stray phrase"
    world:
      catalog:
        facet-missing: true
    expected:
      classification: failed
      error-family: assertion-like
    exercises:
      - error-family: assertion-like
