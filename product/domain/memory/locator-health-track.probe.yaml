# Fixture specification for the `locator-health-track` verb.
# Grammar: docs/v2-readiness.md §4.
#
# Not browser-bound. Only declared error family is unclassified;
# every fixture classifies as matched because tracking an attempt
# (whatever its outcome) is always a successful verb invocation.

verb: locator-health-track
schemaVersion: 1

fixtures:
  - name: track-successful-role-attempt
    description: |
      Record a successful role-strategy attempt on an existing
      element facet. Attempts + successes increment; trend folds.
    input:
      facet-id: ns:exampleA
      strategy: role
      outcome: success
    expected:
      classification: matched
      error-family: null
    exercises:
      - rung: role

  - name: track-failed-test-id-attempt
    description: |
      Record a failed test-id-strategy attempt. A failed ATTEMPT
      is still a successful TRACK — flakiness and trend incorporate
      the outcome downstream.
    input:
      facet-id: ns:exampleA
      strategy: test-id
      outcome: failure
    expected:
      classification: matched
      error-family: null
    exercises:
      - rung: test-id
